<svg width="800" height="650" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="650" fill="#1a1a1a"/>
  
  <!-- Title -->
  <text x="400" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#C9A84C">
    Event-Driven Notification Pipeline Architecture
  </text>
  
  <!-- Event Sources -->
  <rect x="50" y="70" width="700" height="60" fill="#1a1a1a" stroke="#C9A84C" stroke-width="2" rx="5"/>
  <text x="400" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#C9A84C">Event Sources</text>
  <text x="150" y="115" font-size="12" text-anchor="middle" fill="#ddd">Manual Test</text>
  <text x="400" y="115" font-size="12" text-anchor="middle" fill="#ddd">Scheduled Rules</text>
  <text x="650" y="115" font-size="12" text-anchor="middle" fill="#ddd">Custom App</text>
  
  <!-- Arrow to EventBridge -->
  <path d="M 400 130 L 400 170" stroke="#C9A84C" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- EventBridge -->
  <rect x="300" y="170" width="200" height="60" fill="#FF9900" stroke="#CC7700" stroke-width="2" rx="5"/>
  <text x="400" y="195" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">EventBridge</text>
  <text x="400" y="215" font-size="11" text-anchor="middle" fill="#FFF">Event Router</text>
  
  <!-- Fork arrows -->
  <path d="M 350 230 L 250 280" stroke="#C9A84C" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 450 230 L 550 280" stroke="#C9A84C" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Lambda Event Processor -->
  <rect x="150" y="280" width="200" height="60" fill="#FF9900" stroke="#CC7700" stroke-width="2" rx="5"/>
  <text x="250" y="305" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">Lambda</text>
  <text x="250" y="325" font-size="11" text-anchor="middle" fill="#FFF">Event Processor</text>
  
  <!-- SNS Topic -->
  <rect x="450" y="280" width="200" height="60" fill="#DD4B39" stroke="#AA3829" stroke-width="2" rx="5"/>
  <text x="550" y="305" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">SNS Topic</text>
  <text x="550" y="325" font-size="11" text-anchor="middle" fill="#FFF">Pub/Sub Fan-out</text>
  
  <!-- SNS fan-out arrows -->
  <path d="M 500 340 L 450 400" stroke="#C9A84C" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 550 340 L 550 400" stroke="#C9A84C" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 600 340 L 650 400" stroke="#C9A84C" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Email Subscription -->
  <rect x="380" y="400" width="100" height="40" fill="#4285F4" stroke="#3367D6" stroke-width="2" rx="5"/>
  <text x="430" y="425" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFF">Email</text>
  
  <!-- SQS Queue -->
  <rect x="500" y="400" width="100" height="40" fill="#D65532" stroke="#A83F22" stroke-width="2" rx="5"/>
  <text x="550" y="425" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFF">SQS Queue</text>
  
  <!-- SMS Subscription -->
  <rect x="620" y="400" width="100" height="40" fill="#4285F4" stroke="#3367D6" stroke-width="2" rx="5"/>
  <text x="670" y="425" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFF">SMS</text>
  
  <!-- Arrow from SQS to Lambda Queue Reader -->
  <path d="M 550 440 L 550 490" stroke="#C9A84C" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Lambda Queue Reader -->
  <rect x="450" y="490" width="200" height="60" fill="#FF9900" stroke="#CC7700" stroke-width="2" rx="5"/>
  <text x="550" y="515" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFF">Lambda</text>
  <text x="550" y="535" font-size="11" text-anchor="middle" fill="#FFF">Queue Reader</text>
  
  <!-- Arrow to Secrets Manager -->
  <path d="M 500 550 L 400 570" stroke="#C9A84C" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Secrets Manager -->
  <rect x="250" y="560" width="200" height="40" fill="#DD344C" stroke="#AA2939" stroke-width="2" rx="5"/>
  <text x="350" y="585" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFF">Secrets Manager</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#C9A84C"/>
    </marker>
  </defs>
</svg>
